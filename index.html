<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNP Paribas - Accès Client Sécurisé</title>
    <link rel="shortcut icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/BNP_Paribas.svg/500px-BNP_Paribas.svg.png">
    
    <!-- Scripts React et Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        window.FirebaseSDK = { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, orderBy, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, doc, setDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .gold-card { background: linear-gradient(135deg, #c19a27 0%, #f7e07a 50%, #a67c00 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Sécurité pour la configuration Firebase
        let firebaseConfig = {};
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        } catch (e) {
            console.error("Erreur de config Firebase", e);
        }

        const CLIENT_ID = "741085296";
        const CLIENT_MDP = "456123";
        const INITIAL_BALANCE = 2452400;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bnp-fictif-001';

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                menu: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>,
                x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
                logout: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
                eye: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
                send: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
                history: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
                alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            };
            return icons[name] || null;
        };

        function App() {
            const [view, setView] = useState('login');
            const [loginId, setLoginId] = useState('');
            const [loginMdp, setLoginMdp] = useState('');
            const [error, setError] = useState('');
            const [isTransferring, setIsTransferring] = useState(false);
            const [showTransferError, setShowTransferError] = useState(false);
            const [beneficiaryName, setBeneficiaryName] = useState('');

            // Initialisation Firebase silencieuse
            useEffect(() => {
                const init = async () => {
                    if (window.FirebaseSDK && firebaseConfig.apiKey) {
                        try {
                            const { initializeApp, getAuth, signInAnonymously } = window.FirebaseSDK;
                            const app = initializeApp(firebaseConfig);
                            const auth = getAuth(app);
                            await signInAnonymously(auth);
                        } catch (err) {
                            console.warn("Firebase non initialisé (mode déconnecté)");
                        }
                    }
                };
                init();
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginId.trim() === CLIENT_ID && loginMdp.trim() === CLIENT_MDP) {
                    setView('dashboard');
                    setError('');
                } else {
                    setError('Identifiants incorrects. Veuillez vérifier votre numéro client et votre code secret.');
                }
            };

            const handleTransfer = (e) => {
                e.preventDefault();
                const name = e.target.beneficiary.value;
                setBeneficiaryName(name);
                setIsTransferring(true);
                setTimeout(() => {
                    setIsTransferring(false);
                    setShowTransferError(true);
                }, 3000);
            };

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-emerald-900">
                        <div className="w-full max-w-md bg-white rounded-[32px] shadow-2xl overflow-hidden animate-in">
                            <div className="p-10 text-center">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/BNP_Paribas.svg/500px-BNP_Paribas.svg.png" className="h-10 mx-auto mb-6" alt="BNP Logo" />
                                <h1 className="text-2xl font-black tracking-tight text-emerald-800 uppercase">Accès Client</h1>
                            </div>
                            <form onSubmit={handleLogin} className="p-10 pt-0 space-y-6">
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">N° Client</label>
                                    <input type="text" value={loginId} onChange={e => setLoginId(e.target.value)} className="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#00965e]" placeholder="741085296" required />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Code secret</label>
                                    <input type="password" value={loginMdp} onChange={e => setLoginMdp(e.target.value)} className="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#00965e]" placeholder="456123" required />
                                </div>
                                {error && <p className="text-red-500 text-sm font-bold text-center bg-red-50 p-3 rounded-xl">{error}</p>}
                                <button type="submit" className="w-full bg-[#00965e] text-white py-5 rounded-2xl font-bold text-lg hover:bg-[#007a4d] transition-all shadow-lg active:scale-95">S'identifier</button>
                                <p className="text-center text-[10px] text-gray-400 uppercase font-bold tracking-widest">La banque d'un monde qui change</p>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    <header className="bg-[#00965e] text-white p-6 shadow-lg">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <span className="font-black text-2xl tracking-tighter">BNP PARIBAS</span>
                            <button onClick={() => setView('login')} className="flex items-center gap-2 font-bold text-sm bg-white/10 px-4 py-2 rounded-xl hover:bg-white/20 transition-colors"><Icon name="logout" size={18} /> Déconnexion</button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-6 space-y-8 animate-in">
                        <div className="bg-white p-8 rounded-[32px] shadow-sm border border-gray-100">
                            <p className="text-gray-400 text-xs font-bold uppercase tracking-widest mb-2">Solde disponible - Compte Courant</p>
                            <h2 className="text-5xl font-black text-emerald-900 tracking-tighter">{INITIAL_BALANCE.toLocaleString('fr-FR')} €</h2>
                            <p className="mt-4 text-xs font-bold text-emerald-600 bg-emerald-50 inline-block px-3 py-1 rounded-full uppercase">Titulaire : SABINE FOULON</p>
                        </div>

                        <div className="grid md:grid-cols-2 gap-8">
                            <div className="space-y-6">
                                <h3 className="font-black text-xl uppercase tracking-tight flex items-center gap-2"><Icon name="send" size={20} className="text-[#00965e]"/> Nouveau virement</h3>
                                <form onSubmit={handleTransfer} className="bg-white p-8 rounded-[32px] shadow-sm border border-gray-100 space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Bénéficiaire</label>
                                        <input name="beneficiary" type="text" className="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Nom et Prénom" required />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">IBAN</label>
                                        <input type="text" className="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" placeholder="FR76..." required />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Montant</label>
                                        <input type="number" className="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" placeholder="0.00 €" required />
                                    </div>
                                    <button disabled={isTransferring} className="w-full bg-[#00965e] text-white py-4 rounded-xl font-bold hover:bg-[#007a4d] transition-all disabled:opacity-50 shadow-md active:scale-95">
                                        {isTransferring ? 'Validation en cours...' : 'Confirmer le virement'}
                                    </button>
                                </form>
                            </div>

                            <div className="space-y-6">
                                <h3 className="font-black text-xl uppercase tracking-tight flex items-center gap-2"><Icon name="history" size={20} className="text-[#00965e]"/> Historique récent</h3>
                                <div className="space-y-3">
                                    <div className="bg-white p-5 rounded-[24px] border border-gray-100 flex justify-between items-center hover:shadow-md transition-shadow">
                                        <div><p className="font-bold text-sm text-gray-800">Virement reçu - SCI Patrimoine</p><p className="text-[10px] text-gray-400 uppercase font-bold">05 Fév. 2026</p></div>
                                        <p className="text-emerald-600 font-black text-lg">+12 500 €</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-[24px] border border-gray-100 flex justify-between items-center hover:shadow-md transition-shadow">
                                        <div><p className="font-bold text-sm text-gray-800">Loyer Janvier 2026</p><p className="text-[10px] text-gray-400 uppercase font-bold">01 Fév. 2026</p></div>
                                        <p className="font-black text-lg">-2 450 €</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-[24px] border border-gray-100 flex justify-between items-center opacity-60">
                                        <div><p className="font-bold text-sm text-gray-800">Prélèvement EDF</p><p className="text-[10px] text-gray-400 uppercase font-bold">28 Jan. 2026</p></div>
                                        <p className="font-black text-lg">-142,30 €</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {showTransferError && (
                        <div className="fixed inset-0 bg-emerald-950/90 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[40px] p-10 max-w-md w-full text-center shadow-2xl animate-in">
                                <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name="alert" size={40} />
                                </div>
                                <h3 className="text-2xl font-black text-gray-800 mb-2 uppercase tracking-tighter">Virement Rejeté</h3>
                                <p className="text-gray-500 mb-8 font-medium">
                                    Le virement vers <span className="font-bold text-gray-800">{beneficiaryName}</span> a été bloqué par le service de sécurité. Votre compte fait l'objet d'un contrôle de conformité.
                                </p>
                                <button onClick={() => setShowTransferError(false)} className="w-full bg-emerald-900 text-white py-5 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">J'ai compris</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
